    <path fill="#E2E8F0" fill-rule="evenodd" d="M31 21a13 13 0 1 0 26 0a13 13 0 1 0 -26 0ZM37 21a7 7 0 1 1 14 0a7 7 0 1 1 -14 0Z"/>
    <rect x="48.5" y="14" width="8.5" height="42" rx="4.2" fill="#E2E8F0"/>
    <rect x="27" y="1.5" width="14" height="10.5" rx="1.6" fill="#E2E8F0"/>
    <rect x="31" y="10.5" width="6" height="3.4" rx="1" fill="#E2E8F0"/>
    <g fill="#F5C24B"><rect x="28.6" y="2.7" width="1.5" height="3" rx=".5"/><rect x="31.1" y="2.7" width="1.5" height="3" rx=".5"/><rect x="33.6" y="2.7" width="1.5" height="3" rx=".5"/><rect x="36.1" y="2.7" width="1.5" height="3" rx=".5"/></g>
  </g>
