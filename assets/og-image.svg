    <text x="150" y="41" text-anchor="middle" font-family="'Sora',Arial,sans-serif" font-size="24" font-weight="700" fill="#fff">Get a Free Estimate</text>
    <text x="332" y="41" font-family="'Inter',Arial,sans-serif" font-size="24" font-weight="700" fill="#fff">Call 619-786-1810</text>
  </g>

  <g transform="translate(960,470)" font-family="'Inter',Arial,sans-serif" font-size="20" font-weight="600" fill="#7DD3FC">
    <text x="0" y="0">Licensed &amp; Insured</text>
    <text x="0" y="40">10+ Years Experience</text>
    <text x="0" y="80">Serving San Diego County</text>
  </g>
