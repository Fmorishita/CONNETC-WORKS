<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ConnectWorks Low Voltage Solutions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060B16"/>
      <stop offset=".55" stop-color="#0A1B3D"/>
      <stop offset="1" stop-color="#0B3E9E"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B57D0"/>
      <stop offset=".55" stop-color="#1A73E8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="28%" r="55%">
      <stop offset="0" stop-color="#38BDF8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#7DD3FC" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark -->
  <g transform="translate(96,90)">
    <rect width="96" height="96" rx="24" fill="url(#mark)"/>
    <g transform="translate(48,48)">
      <g fill="none" stroke="#fff" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 4 L0 -20"/>
        <path d="M0 4 L-22 24"/>
        <path d="M0 4 L22 24"/>
      </g>
      <g fill="#fff">
        <circle cx="0" cy="4" r="7.4"/>
        <circle cx="0" cy="-21" r="5.4"/>
        <circle cx="-22" cy="25" r="5.4"/>
        <circle cx="22" cy="25" r="5.4"/>
      </g>
    </g>
    <text x="118" y="42" font-family="'Sora',Arial,sans-serif" font-size="40" font-weight="800" fill="#fff">ConnectWorks</text>
    <text x="120" y="76" font-family="'Inter',Arial,sans-serif" font-size="17" font-weight="600" letter-spacing="6" fill="#7DD3FC">LOW VOLTAGE SOLUTIONS</text>
  </g>

  <text x="96" y="320" font-family="'Sora',Arial,sans-serif" font-size="62" font-weight="800" fill="#fff">Reliable Low Voltage &amp;</text>
  <text x="96" y="392" font-family="'Sora',Arial,sans-serif" font-size="62" font-weight="800" fill="#fff">Security Solutions in <tspan fill="#38BDF8">San Diego</tspan></text>
  <text x="96" y="452" font-family="'Inter',Arial,sans-serif" font-size="26" font-weight="500" fill="#CBD5E1">Surveillance · Access Control · Structured Cabling · Fiber · Networks</text>

  <g transform="translate(96,506)">
