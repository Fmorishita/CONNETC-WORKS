<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ConnectWorks Low Voltage Solutions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060B16"/><stop offset=".55" stop-color="#0A1B3D"/><stop offset="1" stop-color="#0B3E9E"/>
    </linearGradient>
    <linearGradient id="cwBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3B8BFF"/><stop offset="1" stop-color="#0B3FA8"/></linearGradient>
    <linearGradient id="cwDark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#48566a"/><stop offset="1" stop-color="#0A0E14"/></linearGradient>
    <radialGradient id="glow" cx="80%" cy="26%" r="55%"><stop offset="0" stop-color="#38BDF8" stop-opacity=".32"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><path d="M44 0H0V44" fill="none" stroke="#7DD3FC" stroke-opacity=".08" stroke-width="1"/></pattern>
